name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install smoke-test dependencies
        run: >-
          python -m pip install
          numpy pandas scipy scikit-learn biopython gemmi pyyaml pyarrow matplotlib tqdm
      - name: Compile Python sources
        run: python -m compileall -q src scripts kaggle tests test.py
      - name: Run smoke tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

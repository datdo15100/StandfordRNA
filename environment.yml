# Conda environment for the RNA 3D thesis pipeline.
# Recreate on a new machine with:
#     conda env create -f environment.yml
#     conda activate rna-fold
#
# NOTE on PyTorch: the CUDA build is installed via pip (see the pip: section) so it
# matches your GPU/driver. The pinned build below is CUDA 13.0 (works on RTX 3060 Ti,
# Ampere sm_86). If your driver is older, install a matching build instead, e.g.:
#     pip install torch --index-url https://download.pytorch.org/whl/cu121
name: rna-fold
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - numpy>=2.0
  - pandas>=2.2
  - scipy>=1.13
  - scikit-learn>=1.5
  - biopython>=1.84
  - gemmi>=0.7
  - pyyaml>=6.0
  - pyarrow>=15
  - matplotlib>=3.8
  - tqdm
  - mmseqs2>=15
  - pip
  - pip:
      - tabulate>=0.9
      # GPU PyTorch — pick the index matching your CUDA/driver (see note above).
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch>=2.3

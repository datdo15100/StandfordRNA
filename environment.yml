# Conda environment for the RNA 3D thesis pipeline.
# Recreate on a new machine with:
#     conda env create -f environment.yml
#     conda activate rna-fold
#
# NOTE on PyTorch: the pinned Linux wheel below uses CUDA 13.0 and is verified on
# this WSL machine (RTX 3060 Ti, driver 591.59). Use a compatible official PyTorch
# wheel instead if this environment is recreated on a machine with an older driver.
name: rna-fold
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  - numpy>=2.0
  - pandas>=2.2
  - scipy>=1.13
  - scikit-learn>=1.5
  - biopython>=1.84
  - gemmi>=0.7
  - pyyaml>=6.0
  - pyarrow>=15
  - matplotlib>=3.8
  - tqdm
  - mmseqs2>=15
  - pip
  - pip:
      - tabulate>=0.9
      - kaggle>=2.0
      - kagglehub>=0.3
      - python-dotenv>=1.0
      - torch==2.13.0
